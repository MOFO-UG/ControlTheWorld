<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Enrollment | Cryptonic Area</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script>
tailwind.config={
theme:{
extend:{
colors:{
brand:{
bg:'#f4f7f9',
dark:'#0a0e27',
cyan:'#00d1c7',
purple:'#7c3aed'
}
},
fontFamily:{
tech:['Rajdhani','monospace'],
sans:['Inter','sans-serif']
}
}
}
}
</script>

<style>

body{background:#f4f7f9;}

.glass-card{
background:white;
border:1px solid rgba(0,0,0,0.05);
box-shadow:0 15px 35px rgba(0,0,0,0.03);
}

.input-box{
background:#fbfcfd;
border:1px solid #e2e8f0;
transition:all .3s;
}

.input-box:focus{
border-color:#00d1c7;
background:white;
box-shadow:0 0 0 4px rgba(0,209,199,0.1);
outline:none;
}

.btn-verify{
background:#0a0e27;
transition:.3s;
}

.btn-verify:hover{
background:#020617;
}

</style>

</head>

<body class="font-sans text-slate-800">

<header class="w-full bg-white border-b border-slate-200 py-3 px-6 sticky top-0">

<div class="container mx-auto flex justify-between items-center">

<div class="flex items-center gap-2">

<div class="w-8 h-8 bg-brand-dark rounded flex items-center justify-center p-1">
<img src="assets/cryptonicarea.jpg">
</div>

<div class="flex flex-col">
<span class="font-tech text-lg font-bold text-brand-dark">CRYPTONIC AREA</span>
<span class="font-tech text-[8px] font-bold text-brand-cyan uppercase tracking-widest">Verification Portal</span>
</div>

</div>

</div>

</header>

<main class="container mx-auto px-6 py-10 max-w-3xl">

<div class="glass-card rounded-3xl p-8">

<form id="enrollForm" class="space-y-6">

<div>
<label class="text-[11px] font-bold text-slate-500 uppercase">Full Name</label>
<input id="name" type="text" required class="input-box w-full px-4 py-3 rounded-xl">
</div>

<div>
<label class="text-[11px] font-bold text-slate-500 uppercase">Email Address</label>
<input id="email" type="email" required class="input-box w-full px-4 py-3 rounded-xl">
</div>

<div class="grid md:grid-cols-2 gap-5">

<div>
<label class="text-[11px] font-bold text-slate-500 uppercase">Mobile Number</label>
<input id="mobile" type="tel" required class="input-box w-full px-4 py-3 rounded-xl">
</div>

<div>
<label class="text-[11px] font-bold text-slate-500 uppercase">WhatsApp Number</label>
<input id="whatsapp" type="tel" required class="input-box w-full px-4 py-3 rounded-xl">
</div>

</div>

<div>
<label class="text-[11px] font-bold text-slate-500 uppercase">Transaction ID</label>
<input id="txid" type="text" required class="input-box w-full px-4 py-3 rounded-xl uppercase">
</div>

<button type="submit" class="btn-verify w-full text-white py-4 rounded-xl font-semibold tracking-wide">
Submit Enrollment
</button>

</form>

</div>

</main>
<script>

const OWNER = "MOFO-UG"
const REPO = "ControlTheWorld"

/*
IMPORTANT:
This token must be a Fine-grained token with:
Repository → Issues → Read & Write
*/

const TOKEN = "PASTE_TOKEN_HERE"

document.getElementById("enrollForm").addEventListener("submit", async function(e){

e.preventDefault()

const data={
name:document.getElementById("name").value.trim(),
email:document.getElementById("email").value.trim(),
mobile:document.getElementById("mobile").value.trim(),
whatsapp:document.getElementById("whatsapp").value.trim(),
transaction:document.getElementById("txid").value.trim(),
time:new Date().toISOString(),
device:navigator.userAgent
}

const body = `### Enrollment Submission

Name: ${data.name}
Email: ${data.email}
Mobile: ${data.mobile}
WhatsApp: ${data.whatsapp}
TransactionID: ${data.transaction}

Timestamp: ${data.time}
Device: ${data.device}
`

try{

const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues`,{

method:"POST",

headers:{
"Authorization":"Bearer "+TOKEN,
"Accept":"application/vnd.github+json",
"Content-Type":"application/json"
},

body:JSON.stringify({
title:"Enrollment-"+Date.now(),
body:body
})

})

if(res.status===201){

alert("Enrollment submitted successfully!")

document.getElementById("enrollForm").reset()

}else{

const txt = await res.text()
alert("Error: "+txt)

}

}catch(err){

alert("Network error: "+err)

}

})

</script>

</body>

</html>
