<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Enrollment | Cryptonic Area</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script>
tailwind.config={
theme:{
extend:{
colors:{
brand:{
bg:'#f4f7f9',
dark:'#0a0e27',
cyan:'#00d1c7',
purple:'#7c3aed'
}
},
fontFamily:{
tech:['Rajdhani','monospace'],
sans:['Inter','sans-serif']
}
}
}
}
</script>

<style>

body{background:#f4f7f9;}

.glass-card{
background:white;
border:1px solid rgba(0,0,0,0.05);
box-shadow:0 15px 35px rgba(0,0,0,0.03);
}

.input-box{
background:#fbfcfd;
border:1px solid #e2e8f0;
transition:all 0.3s;
}

.input-box:focus{
border-color:#00d1c7;
background:white;
box-shadow:0 0 0 4px rgba(0,209,199,0.1);
outline:none;
}

@keyframes pulse-cyan{
0%{box-shadow:0 0 0 0 rgba(0,209,199,0.4);}
70%{box-shadow:0 0 0 15px rgba(0,209,199,0);}
100%{box-shadow:0 0 0 0 rgba(0,209,199,0);}
}

.btn-verify{animation:pulse-cyan 2s infinite;}

.pay-redirect-btn{
position:fixed;
bottom:25px;
left:25px;
background:white;
border:1px solid #e2e8f0;
padding:8px 15px;
border-radius:50px;
font-size:10px;
font-weight:bold;
color:#64748b;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
display:flex;
align-items:center;
gap:8px;
}

</style>
</head>

<body class="font-sans text-slate-800">

<header class="w-full bg-white border-b border-slate-200 py-3 px-6 sticky top-0">

<div class="container mx-auto flex justify-between items-center">

<div class="flex items-center gap-2">

<div class="w-8 h-8 bg-brand-dark rounded flex items-center justify-center p-1">

<img src="assets/cryptonicarea.jpg">

</div>

<div class="flex flex-col">

<span class="font-tech text-lg font-bold text-brand-dark">CRYPTONIC AREA</span>

<span class="font-tech text-[8px] font-bold text-brand-cyan uppercase">Verification Portal</span>

</div>

</div>

</div>

</header>

<main class="container mx-auto px-6 py-10 max-w-4xl">

<div class="glass-card rounded-3xl p-8">

<form id="enrollForm" class="space-y-5">

<div>
<label class="text-[10px] font-bold text-slate-400 uppercase">Full Name</label>
<input id="name" required class="input-box w-full px-4 py-3 rounded-xl">
</div>

<div>
<label class="text-[10px] font-bold text-slate-400 uppercase">Email</label>
<input id="email" type="email" required class="input-box w-full px-4 py-3 rounded-xl">
</div>

<div class="grid md:grid-cols-2 gap-5">

<div>
<label class="text-[10px] font-bold text-slate-400 uppercase">Mobile</label>
<input id="mobile" required class="input-box w-full px-4 py-3 rounded-xl">
</div>

<div>
<label class="text-[10px] font-bold text-slate-400 uppercase">WhatsApp</label>
<input id="whatsapp" required class="input-box w-full px-4 py-3 rounded-xl">
</div>

</div>

<div>
<label class="text-[10px] font-bold text-slate-400 uppercase">Transaction ID</label>
<input id="txid" required class="input-box w-full px-4 py-3 rounded-xl">
</div>

<button class="w-full bg-brand-dark text-white py-4 rounded-xl">
Submit Enrollment
</button>

</form>

</div>

</main>

<script>

document.getElementById("enrollForm").addEventListener("submit",function(e){

e.preventDefault()

const name=document.getElementById("name").value
const email=document.getElementById("email").value
const mobile=document.getElementById("mobile").value
const whatsapp=document.getElementById("whatsapp").value
const txid=document.getElementById("txid").value

const body=`
### New Enrollment Submission

Name: ${name}
Email: ${email}
Mobile: ${mobile}
WhatsApp: ${whatsapp}
Transaction ID: ${txid}

Timestamp: ${new Date().toISOString()}
Device: ${navigator.userAgent}
`

const encodedBody=encodeURIComponent(body)

const url=`https://github.com/MOFO-UG/ControlTheWorld/issues/new?title=New%20Enrollment&body=${encodedBody}`

window.open(url,"_blank")

})

</script>

</body>
</html>
